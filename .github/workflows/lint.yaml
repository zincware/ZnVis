name: Linting

on:
  push:
  pull_request:

permissions:
  contents: read  # only read access, no secrets

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Black Check
        uses: psf/black@stable

  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install isort
        run: |
          pip install isort
      - name: run isort
        run: |
          isort --check-only --quiet .
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install flake8
        run: |
          pip install flake8
      - name: run flake8
        run: |
          flake8 . --count --show-source --statistics
